info:
  name: Get current user
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/users/me"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Current user
    request:
      url: "{{baseUrl}}/api/users/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "item": {
              "id": 0,
              "email": "",
              "createdAt": ""
            }
          }
  - name: 403 Response
    description: Access denied
    request:
      url: "{{baseUrl}}/api/users/me"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": ""
          }
