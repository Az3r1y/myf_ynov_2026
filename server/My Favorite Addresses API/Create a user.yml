info:
  name: Create a user
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/users"
  body:
    type: json
    data: |-
      {
        "email": "{{userEmail}}",
        "password": "{{userPassword}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: User created
    request:
      url: "{{baseUrl}}/api/users"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "{{userEmail}}",
            "password": "{{userPassword}}"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "item": {
              "id": 0,
              "email": "",
              "createdAt": ""
            }
          }
  - name: 400 Response
    description: Validation error
    request:
      url: "{{baseUrl}}/api/users"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "{{userEmail}}",
            "password": "{{userPassword}}"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": ""
          }
  - name: 500 Response
    description: Server error
    request:
      url: "{{baseUrl}}/api/users"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "{{userEmail}}",
            "password": "{{userPassword}}"
          }
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": ""
          }
