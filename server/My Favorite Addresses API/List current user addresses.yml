info:
  name: List current user addresses
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/api/addresses"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Addresses
    request:
      url: "{{baseUrl}}/api/addresses"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "items": [
              {
                "id": 0,
                "name": "",
                "description": "",
                "lng": 0,
                "lat": 0,
                "createdAt": ""
              }
            ]
          }
  - name: 403 Response
    description: Access denied
    request:
      url: "{{baseUrl}}/api/addresses"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": ""
          }
