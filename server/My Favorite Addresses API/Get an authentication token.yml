info:
  name: Get an authentication token
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/users/tokens"
  body:
    type: json
    data: |-
      {
        "email": "",
        "password": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Token generated
    request:
      url: "{{baseUrl}}/api/users/tokens"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": ""
          }
  - name: 400 Response
    description: Wrong credentials or validation error
    request:
      url: "{{baseUrl}}/api/users/tokens"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": ""
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": ""
          }
