info:
  name: Search addresses within a radius from coordinates
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/api/addresses/searches"
  body:
    type: json
    data: |-
      {
        "radius": 0,
        "from": {
          "lat": 0,
          "lng": 0
        }
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Filtered addresses
    request:
      url: "{{baseUrl}}/api/addresses/searches"
      method: POST
      body:
        type: json
        data: |-
          {
            "radius": 0,
            "from": {
              "lat": 0,
              "lng": 0
            }
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "items": [
              {
                "id": 0,
                "name": "",
                "description": "",
                "lng": 0,
                "lat": 0,
                "createdAt": ""
              }
            ]
          }
  - name: 400 Response
    description: Validation error
    request:
      url: "{{baseUrl}}/api/addresses/searches"
      method: POST
      body:
        type: json
        data: |-
          {
            "radius": 0,
            "from": {
              "lat": 0,
              "lng": 0
            }
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": ""
          }
  - name: 403 Response
    description: Access denied
    request:
      url: "{{baseUrl}}/api/addresses/searches"
      method: POST
